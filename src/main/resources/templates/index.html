<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Física em Degraus</title>

    <script th:inline="none">
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$']]
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="/css/style.css?v=1">

    <style>
        /* Estilos específicos para o feedback de acerto/erro acoplados aos cards */
        .alternativa.correta {
            background-color: #065f46 !important;
            /* Verde escuro */
            border-color: #10b981 !important;
            color: #ecfdf5 !important;
            font-weight: bold;
        }

        .alternativa.errada {
            background-color: #991b1b !important;
            /* Vermelho escuro */
            border-color: #ef4444 !important;
            color: #fef2f2 !important;
            text-decoration: line-through;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Física em Degraus</h1>

        <div th:if="${questao != null}">

            <div class="topo-jogo">

                <div class="nivel-box">
                    <span class="nivel-label">NÍVEL</span>
                    <span class="nivel-numero" th:text="${questao.nivel}"></span>
                </div>

                <div class="acertos-box">
                    <span class="acertos-label">Acertos neste nível</span>
                    <span class="acertos-valor">
                        <span th:text="${acertosNivel}"></span> / 5
                    </span>
                </div>

            </div>

            <div class="questao-card">
                <h3 class="titulo-questao">Questão</h3>

                <div class="questao" th:utext="${questao.enunciado}">
                </div>
            </div>

            <form th:action="@{/responder}" method="post">
                <input type="hidden" name="questaoId" th:value="${questao.id}">
                <input type="hidden" name="nomeAluno" th:value="${nomeAluno}">

                <div class="alternativas">

                    <label class="alternativa" th:classappend="${acertou != null} ? 
                        (${questao.respostaCorreta == 'A'} ? 'correta' : 
                        (${resposta == 'A'} ? 'errada' : '')) 
                        : ''">
                        <input type="radio" name="resposta" value="A" th:disabled="${acertou != null}">
                        <span>A) &nbsp; </span> <span th:utext="${questao.alternativaA}"></span>
                    </label>

                    <label class="alternativa" th:classappend="${acertou != null} ? 
                        (${questao.respostaCorreta == 'B'} ? 'correta' : 
                        (${resposta == 'B'} ? 'errada' : '')) 
                        : ''">
                        <input type="radio" name="resposta" value="B" th:disabled="${acertou != null}">
                        <span>B) &nbsp;</span> <span th:utext="${questao.alternativaB}"></span>
                    </label>

                    <label class="alternativa" th:classappend="${acertou != null} ? 
                        (${questao.respostaCorreta == 'C'} ? 'correta' : 
                        (${resposta == 'C'} ? 'errada' : '')) 
                        : ''">
                        <input type="radio" name="resposta" value="C" th:disabled="${acertou != null}">
                        <span>C) &nbsp; </span> <span th:utext="${questao.alternativaC}"></span>
                    </label>

                    <label class="alternativa" th:classappend="${acertou != null} ? 
                        (${questao.respostaCorreta == 'D'} ? 'correta' : 
                        (${resposta == 'D'} ? 'errada' : '')) 
                        : ''">
                        <input type="radio" name="resposta" value="D" th:disabled="${acertou != null}">
                        <span>D) &nbsp; </span> <span th:utext="${questao.alternativaD}"></span>
                    </label>

                    <label class="alternativa" th:classappend="${acertou != null} ? 
                        (${questao.respostaCorreta == 'E'} ? 'correta' : 
                        (${resposta == 'E'} ? 'errada' : '')) 
                        : ''">
                        <input type="radio" name="resposta" value="E" th:disabled="${acertou != null}">
                        <span>E) &nbsp; </span> <span th:utext="${questao.alternativaE}"></span>
                    </label>

                </div>

                <button type="submit" th:if="${acertou == null}">
                    ENVIAR RESPOSTA
                </button>
            </form>

            <div th:if="${acertou != null}" class="resultado"
                th:style="${acertou} ? 'border-left-color: #22c55e;' : 'border-left-color: #ef4444;'">
                <h3
                    th:text="${acertou} ? '✅ Excelente! Você acertou.' : '❌ Não foi dessa vez, tente analisar a resolução abaixo.'">
                </h3>
            </div>

            <div th:if="${acertou != null}">
                <form th:action="@{/proxima}" method="get">
                    <input type="hidden" name="nivel" th:value="${questao.nivel}">
                    <input type="hidden" name="nomeAluno" th:value="${nomeAluno}">
                    <button type="submit" style="background-color: #10b981;">Avançar para a Próxima ➡️</button>
                </form>
            </div>

            <div th:if="${acertou != null}" class="resolucao">
                <h3 style="margin-bottom: 8px; color: #3b82f6;">📘 Resolução Passo a Passo:</h3>
                <div th:utext="${questao.resolucaoComentada}"></div>
            </div>

        </div>

        <div th:if="${mensagem != null}" style="text-align: center; padding: 20px 0;">
            <h2 th:text="${mensagem}" style="margin-bottom: 20px;"></h2>
            <form th:action="@{/}" method="get">
                <button type="submit">
                    🔄 Reiniciar Desafio
                </button>
            </form>
        </div>

    </div>
    <script>
        MathJax.typeset();
    </script>
</body>

</html>
